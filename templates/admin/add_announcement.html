{% extends "dashboard_base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0 border-top border-primary border-3">
            <div class="card-header bg-white pb-0">
                <h4 class="card-title mb-2"><i class="fa-solid fa-bullhorn me-2 text-primary"></i>Create New Announcement</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('admin.add_announcement') }}" method="POST" enctype="multipart/form-data">
                    <div class="row mb-3">
                        <div class="col-md-8">
                            <label for="title" class="form-label fw-bold">Announcement Title / Subject <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" placeholder="e.g. Village Gram Sabha Meeting Notice" required>
                        </div>
                        <div class="col-md-4">
                            <label for="category" class="form-label fw-bold">Category</label>
                            <select class="form-select" id="category" name="category">
                                <option value="General" selected>General</option>
                                <option value="Urgent">Urgent / Emergency</option>
                                <option value="Health">Health & Sanitation</option>
                                <option value="Education">Education</option>
                                <option value="Agriculture">Agriculture</option>
                                <option value="Scheme">Govt Schemes</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="content" class="form-label fw-bold">Detailed Notice Content <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="content" name="content" rows="5" placeholder="Provide complete information, venue, date, and instructions..." required></textarea>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="scheduled_date" class="form-label fw-bold"><i class="fa-solid fa-calendar-clock me-1"></i>Schedule Release Date/Time (Optional)</label>
                            <input type="datetime-local" class="form-control" id="scheduled_date" name="scheduled_date">
                            <small class="text-muted">Leave empty for immediate publication.</small>
                        </div>
                        <div class="col-md-6">
                            <label for="attachment" class="form-label fw-bold"><i class="fa-solid fa-paperclip me-1"></i>Attach PDF or Image File (Optional)</label>
                            <input type="file" class="form-control" id="attachment" name="attachment" accept=".pdf,.jpg,.jpeg,.png">
                            <small class="text-muted">Supported: PDF, JPG, PNG (Max 5MB).</small>
                        </div>
                    </div>
                    
                    <div class="row mb-4 bg-light p-3 rounded">
                        <div class="col-md-6 form-check mb-2 mb-md-0">
                            <input type="checkbox" class="form-check-input" id="is_published" name="is_published" checked>
                            <label class="form-check-label fw-bold" for="is_published">Publish immediately to Villager Dashboard</label>
                        </div>
                        <div class="col-md-6 form-check">
                            <input type="checkbox" class="form-check-input" id="is_pinned" name="is_pinned">
                            <label class="form-check-label fw-bold text-danger" for="is_pinned"><i class="fa-solid fa-thumbtack me-1"></i>Pin to top of announcements</label>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.announcements') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4"><i class="fa-solid fa-paper-plane me-1"></i> Post Announcement</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
