{% extends "dashboard_base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0 border-top border-success border-3">
            <div class="card-header bg-white pb-0">
                <h4 class="card-title mb-2">Issue New Tax Bill</h4>
                <small class="text-muted">Assign Property, House, or Water tax to a registered villager</small>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('admin.add_tax') }}" method="POST">
                    <div class="mb-3">
                        <label for="villager_id" class="form-label fw-bold">Select Resident (Villager) <span class="text-danger">*</span></label>
                        <select class="form-select" id="villager_id" name="villager_id" required>
                            <option value="">-- Choose Resident --</option>
                            {% for v in villagers %}
                            <option value="{{ v.id }}">{{ v.full_name }} (Mobile: {{ v.mobile }} | Aadhaar: {{ v.aadhaar }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="tax_type" class="form-label fw-bold">Tax Type <span class="text-danger">*</span></label>
                            <select class="form-select" id="tax_type" name="tax_type" required>
                                <option value="Property Tax">Property Tax</option>
                                <option value="House Tax">House Tax</option>
                                <option value="Water Tax">Water Tax</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="amount" class="form-label fw-bold">Tax Amount Payable (Rs) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" step="0.01" min="1" class="form-control" id="amount" name="amount" placeholder="e.g. 1500.00" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="due_date" class="form-label fw-bold">Payment Due Date <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="due_date" name="due_date" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="remarks" class="form-label fw-bold">Administrative Remarks / Notes</label>
                        <textarea class="form-control" id="remarks" name="remarks" rows="3" placeholder="Optional details regarding tax assessment or billing period..."></textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.taxes') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success px-4"><i class="fa-solid fa-check me-1"></i> Issue Tax Bill</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
