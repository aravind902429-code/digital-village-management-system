{% extends "dashboard_base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0 border-top border-primary border-3">
            <div class="card-header bg-white pb-0">
                <h4 class="card-title mb-2">Add New Government Scheme</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('admin.add_scheme') }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="title" class="form-label">Scheme Title</label>
                        <input type="text" class="form-control" id="title" name="title" placeholder="e.g. PM Kisan Samman Nidhi" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Overview & Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Brief explanation of the scheme..." required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="eligibility" class="form-label">Eligibility Criteria</label>
                        <textarea class="form-control" id="eligibility" name="eligibility" rows="3" placeholder="Who can apply? Age, income limits, occupation..." required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="benefits" class="form-label">Key Benefits</label>
                        <textarea class="form-control" id="benefits" name="benefits" rows="3" placeholder="Financial aid, subsidies, health coverage details..." required></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="image" class="form-label">Upload Scheme Image / Banner (Optional)</label>
                        <input class="form-control" type="file" id="image" name="image" accept="image/*">
                        <div class="form-text">Upload a banner or logo representing this scheme.</div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.schemes') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">Create Scheme</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
