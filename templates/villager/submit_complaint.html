{% extends "dashboard_base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0 border-top border-warning border-3">
            <div class="card-header bg-white pb-0">
                <h4 class="card-title mb-2">Submit a Complaint</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('villager.submit_complaint') }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="category" class="form-label">Complaint Category</label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">Select Category...</option>
                            <option value="Water Supply">Water Supply</option>
                            <option value="Street Light">Street Light</option>
                            <option value="Road Damage">Road Damage</option>
                            <option value="Drainage">Drainage</option>
                            <option value="Electricity">Electricity</option>
                            <option value="Sanitation">Sanitation</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description of Issue</label>
                        <textarea class="form-control" id="description" name="description" rows="4" placeholder="Please provide detailed information about the issue..." required></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="image" class="form-label">Upload Image (Optional)</label>
                        <input class="form-control" type="file" id="image" name="image" accept="image/*">
                        <div class="form-text">Uploading a clear picture helps us understand and resolve the issue faster.</div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('villager.complaints') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-warning text-dark px-4">Submit Complaint</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
