{% extends "dashboard_base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white pb-0">
                <h4 class="card-title mb-2">Apply for Certificate</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('villager.apply_certificate') }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="type" class="form-label">Certificate Type</label>
                        <select class="form-select" id="type" name="type" required>
                            <option value="">Select Type...</option>
                            <option value="Income Certificate">Income Certificate</option>
                            <option value="Residence Certificate">Residence Certificate</option>
                            <option value="Community Certificate">Community Certificate</option>
                            <option value="Birth Certificate">Birth Certificate</option>
                            <option value="Death Certificate">Death Certificate</option>
                        </select>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="applicant_name" class="form-label">Applicant Name</label>
                            <input type="text" class="form-control" id="applicant_name" name="applicant_name" value="{{ villager.full_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="mobile" class="form-label">Mobile Number</label>
                            <input type="text" class="form-control" id="mobile" name="mobile" value="{{ villager.mobile }}" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="aadhaar" class="form-label">Aadhaar Number</label>
                        <input type="text" class="form-control" id="aadhaar" name="aadhaar" value="{{ villager.aadhaar }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <textarea class="form-control" id="address" name="address" rows="3" required>{{ villager.address }}</textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="document" class="form-label">Upload Required Document (Image/PDF)</label>
                        <input class="form-control" type="file" id="document" name="document">
                        <div class="form-text">Please upload supporting documents (Max 2MB).</div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('villager.certificates') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success px-4">Submit Application</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
